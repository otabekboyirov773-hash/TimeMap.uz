<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>TimeMap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

/* 🔥 INTRO */
#intro{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:9999;
}

/* BUTTONS */
.controls{
  position:fixed;
  top:10px;
  left:10px;
  z-index:999;
  display:flex;
  flex-direction:column;
  gap:6px;
}

button{
  padding:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* SEARCH */
#search{
  position:fixed;
  top:10px;
  right:10px;
  z-index:999;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* 🔥 POPUP BOX */
#notify{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 15px;
  border-radius:10px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">😳 Sizga eng yaqin joylarni topyapmiz...</div>

<!-- 🔥 NOTIFICATION -->
<div id="notify"></div>

<input id="search" placeholder="🔍 Qidir...">

<div class="controls">
<button onclick="showTop()">🔥 Top 5</button>
<button onclick="showMosque()">🕌 Masjid</button>
<button onclick="showFood()">🍔 Ovqat</button>
<button onclick="showShop()">🛒 Do‘kon</button>
<button onclick="showAll()">🌍 Hammasi</button>
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([41.3111,69.2797], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

let markers = [];

const places = [
{Name:"Minor Mosque",Lat:41.3485,Lng:69.2890,Type:"masjid",Emoji:"🕌",Description:"Mashhur masjid"},
{Name:"Korzinka",Lat:41.3111,Lng:69.2797,Type:"shop",Emoji:"🛒",Description:"Supermarket"},
{Name:"Havas",Lat:41.3200,Lng:69.3000,Type:"shop",Emoji:"🛒",Description:"Arzon do‘kon"},
{Name:"Cafe",Lat:41.3050,Lng:69.2500,Type:"food",Emoji:"🍔",Description:"Mazali ovqat"},
{Name:"Park",Lat:41.3150,Lng:69.2700,Type:"place",Emoji:"🌳",Description:"Dam olish joyi"}
];

// 🔥 NOTIFY FUNCTION
function showNotify(text){
  const box = document.getElementById("notify");
  box.innerText = text;
  box.style.display = "block";

  setTimeout(()=>{ box.style.display="none"; },2000);
}

// DISTANCE
function getDistance(a,b,c,d){
return Math.sqrt((a-c)**2 + (b-d)**2);
}

// TOP 5
function getTopPlaces(lat,lng){
return places
.map(p=>({...p,dist:getDistance(lat,lng,p.Lat,p.Lng)}))
.sort((a,b)=>a.dist-b.dist)
.slice(0,5);
}

// CLEAR
function clearMarkers(){
markers.forEach(m=>map.removeLayer(m));
markers=[];
}

// ROUTE
function goRoute(lat,lng){
window.open(`https://www.google.com/maps?q=${lat},${lng}`);
}

// NAMOZ
function loadPrayer(id,lat,lng){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=2`)
.then(r=>r.json())
.then(d=>{
const t=d.data.timings;
document.getElementById(id).innerHTML =
"🕌 Bomdod: "+t.Fajr+"<br>"+
"Peshin: "+t.Dhuhr+"<br>"+
"Asr: "+t.Asr;
});
}

// RENDER
function render(list){
clearMarkers();

list.forEach(p=>{
const id = "pr_"+p.Name.replace(/\s/g,'');

const marker = L.marker([p.Lat,p.Lng]).addTo(map)
.bindPopup(`
${p.Emoji} <b>${p.Name}</b><br>
${p.Description}<br><br>

<button onclick="goRoute(${p.Lat},${p.Lng})">🚗 Borish</button><br><br>

${p.Type==="masjid" ? `<div id="${id}">⏳ Yuklanmoqda...</div>` : ""}

<br>🔥 Trend joy
<br>👀 ${Math.floor(Math.random()*50)} kishi ko‘ryapti
`)
.on('click',()=>{
if(p.Type==="masjid"){
loadPrayer(id,p.Lat,p.Lng);
}
});

markers.push(marker);
});
}

// FILTER
function showAll(){ render(places); }
function showMosque(){ render(places.filter(p=>p.Type==="masjid")); }
function showFood(){ render(places.filter(p=>p.Type==="food")); }
function showShop(){ render(places.filter(p=>p.Type==="shop")); }

function showTop(){
navigator.geolocation.getCurrentPosition(pos=>{
const top = getTopPlaces(pos.coords.latitude,pos.coords.longitude);
render(top);
});
}

// SEARCH
document.getElementById("search").addEventListener("input",function(e){
const val = e.target.value.toLowerCase();

const filtered = places.filter(p =>
p.Name.toLowerCase().includes(val)
);

render(filtered);
});

// USER LOCATION
navigator.geolocation.getCurrentPosition(pos=>{
const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

map.setView([lat,lng],14);

L.marker([lat,lng]).addTo(map)
.bindPopup("📍 Siz shu yerdasiz")
.openPopup();

showTop();

// 🔥 WOW NOTIFY
setTimeout(()=>showNotify("🔥 Sizga eng yaqin joylar topildi"),1500);
setTimeout(()=>showNotify("😳 Siz shu hududdasiz"),3000);
setTimeout(()=>showNotify("🎁 Sizga maxfiy joylar ochildi"),4500);
});

// 🔥 INTRO HIDE
setTimeout(()=>{
document.getElementById("intro").style.display="none";
},2000);

// 🔥 LIVE USERS
setInterval(()=>{
const lat = 41.3 + (Math.random()-0.5)*0.1;
const lng = 69.2 + (Math.random()-0.5)*0.1;

L.circleMarker([lat,lng],{radius:5})
.addTo(map)
.bindPopup("👀 Foydalanuvchi shu yerda");

},3000);

// 🔥 RANDOM NOTIFY
setInterval(()=>{
const msgs = [
"🔥 12 kishi shu joyni ko‘ryapti",
"👀 Yangi user kirdi",
"📍 Yangi joy qo‘shildi"
];
showNotify(msgs[Math.floor(Math.random()*msgs.length)]);
},6000);

</script>

</body>
</html>
